# ?? Servidor ??????????????????????????????????????????
server.port=8080

# ?? Banco de dados ????????????????????????????????????
# URL de conexão com o PostgreSQL local
spring.datasource.url=jdbc:postgresql://localhost:5432/print3d

# Usuário e senha do seu PostgreSQL local
spring.datasource.username=postgres
spring.datasource.password=1234

# Driver JDBC do PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver

# ?? JPA / Hibernate ???????????????????????????????????
# update = cria/altera tabelas automaticamente sem apagar dados
# (em produção troca por validate ou flyway)
spring.jpa.hibernate.ddl-auto=update

# Mostra o SQL gerado pelo JPA no console ? ótimo pra debugar
spring.jpa.show-sql=true

# Dialeto específico do PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ?? JWT ???????????????????????????????????????????????
# Chave secreta usada pra assinar os tokens (mínimo 256 bits)
# Em produção vai numa variável de ambiente, NUNCA no código
jwt.secret=minha-chave-super-secreta-print3d-2025-deve-ser-longa
jwt.expiration=86400000

# ?? Cloudinary ????????????????????????????????????????
cloudinary.cloud-name=seu_cloud_name
cloudinary.api-key=sua_api_key
cloudinary.api-secret=seu_api_secret

# ?? Upload ????????????????????????????????????????????
# Tamanho máximo de arquivo aceito (fotos dos produtos)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
